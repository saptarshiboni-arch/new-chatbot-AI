<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MEDCHAT</title>

    <style>
      /* Reset */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      /* Background with medical image */
      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background:
          linear-gradient(rgba(4, 24, 66, 0.8), rgba(8, 129, 173, 0.8)),
          url("https://images.unsplash.com/photo-1588776814546-ec7e3c1c5e12");
        background-size: cover;
        background-position: center;
      }

      /* MAIN CHAT CONTAINER (UPDATED HEAVILY) */

      /* Chat box */

      .chat-container {
        width: 400px;
        height: 630px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        box-shadow: 0 15px 45px rgba(0, 0, 0, 0.25);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      /* Header with image */
      .chat-container h2 {
        background: linear-gradient(135deg, #0a6ebd, #0dcaf0);
        color: white;
        padding: 15px;
        font-size: 18px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      /* Doctor icon */
      .chat-container h2 img {
        width: 32px;
        height: 32px;
        border-radius: 50%;
      }

      /* Chat box */
      .chat-box {
        flex: 1;
        padding: 18px;
        overflow-y: auto;
        background: #f4f9fc;
        padding: 15px;
        overflow-y: auto;
        background: url("https://www.transparenttextures.com/patterns/cubes.png");
        display: flex;
        flex-direction: column;
      }

      /* Messages */
      .message {
        margin-bottom: 14px;
        max-width: 75%;
        padding: 12px 16px;
        border-radius: 16px;
        font-size: 14px;
        line-height: 1.5;
      }

      /* User message */
      .user-message {
        background: linear-gradient(135deg, #0a6ebd, #0dcaf0);
        color: white;
        align-self: flex-end;
        border-bottom-right-radius: 4px;
      }

      /* Bot message */
      .bot-message {
        background: white;
        color: #333;
        align-self: flex-start;
        border: 1px solid #e0e0e0;
        border-bottom-left-radius: 4px;
      }

      /* Input area */
      .input-area {
        display: flex;
        border-top: 1px solid #ddd;
        background: #fff;
      }

      /* Input */
      input {
        border: none;
        padding: 14px;
        outline: none;
        width: 75%;
        font-size: 14px;
      }

      /* Button */
      button {
        width: 25%;
        border: none;
        background: linear-gradient(135deg, #0a6ebd, #0dcaf0);
        color: white;
        font-size: 18px;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        opacity: 0.9;
      }
    </style>
  </head>

  <body>
    <div style="position: absolute; top: 10px; right: 10px">
      <button
        onclick="window.location.href = '/history'"
        style="
          background-color: #00acee;
          color: white;
          padding: 10px 24px;
          border: none;
          border-radius: 8px;
          cursor: pointer;
          display: inline-block;
          width: auto;
          white-space: nowrap;
          font-family: sans-serif;
          font-weight: bold;
        ">
        View History
      </button>
    </div>

    <div class="chat-container">
      <h2>
        <img src="https://cdn-icons-png.flaticon.com/512/387/387561.png" />
        MedAI Assistant
      </h2>

      <div id="chat-box" class="chat-box"></div>

      <div class="input-area">
        <input
          type="search"
          id="user-input"
          placeholder="Enter your medical query..." />
        <button onclick="sendMessage()">🔍</button>
      </div>
    </div>

    <script>
      async function sendMessage() {
        let input = document.getElementById("user-input");
        let message = input.value.trim();

        if (!message) return;

        let chatBox = document.getElementById("chat-box");

        // User message
        let userMsg = document.createElement("div");
        userMsg.classList.add("message", "user-message");
        userMsg.innerText = message;
        chatBox.appendChild(userMsg);

        input.value = "";

        // Bot placeholder
        let botMsg = document.createElement("div");
        botMsg.classList.add("message", "bot-message");
        botMsg.innerText = "Typing...";
        chatBox.appendChild(botMsg);

        try {
          const res = await fetch("http://127.0.0.1:5000/chat", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ message: message }),
          });

          // ✅ Check server status
          if (!res.ok) {
            const errorText = await res.text();
            console.error("Server error:", errorText);
            botMsg.innerText = "Server error (" + res.status + ")";
            return;
          }

          // ✅ Read response safely
          const text = await res.text();

          let data;
          try {
            data = JSON.parse(text);
          } catch (e) {
            console.error("Invalid JSON:", text);
            botMsg.innerText = "Invalid response from server";
            return;
          }

          // ✅ Show response
          botMsg.innerText = data.response || "No response from bot";
        } catch (error) {
          console.error("Fetch error:", error);
          botMsg.innerText = "Connection error";
        }

        chatBox.scrollTop = chatBox.scrollHeight;
      }

      // ✅ BONUS: Press Enter to send
      document
        .getElementById("user-input")
        .addEventListener("keypress", function (e) {
          if (e.key === "Enter") {
            sendMessage();
          }
        });
    </script>
  </body>
</html>
